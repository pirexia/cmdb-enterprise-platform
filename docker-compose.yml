version: "3.9"

services:
  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cmdb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: cmdb_pass123
      POSTGRES_DB: cmdb_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cmdb_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Adminer (lightweight DB GUI) ────────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: cmdb_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: cmdb_postgres_data
